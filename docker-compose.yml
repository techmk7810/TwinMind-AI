services:
  db:
    image: postgres:16-alpine
    container_name: twinmind-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-twinmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-twinmind}
      POSTGRES_DB: ${POSTGRES_DB:-twinmind}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-twinmind} -d ${POSTGRES_DB:-twinmind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: twinmind-backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-twinmind}:${POSTGRES_PASSWORD:-twinmind}@db:5432/${POSTGRES_DB:-twinmind}
      BACKEND_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: twinmind-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
